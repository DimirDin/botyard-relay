services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-botyard_relay}
      POSTGRES_USER: ${DB_USER:-botyard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-botyard}
    volumes:
      - relay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-botyard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - relay_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "bot.main"]

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3013:3013"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["uvicorn", "webapp.backend.main:app", "--host", "0.0.0.0", "--port", "3013"]

volumes:
  relay_pgdata:
  relay_redisdata:
